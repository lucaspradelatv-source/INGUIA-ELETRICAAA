<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Vote na Enguia Elétrica</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:white;
  text-align:center;
}

.secao{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

img{
  max-width:300px;
}

#contador{
  margin:10px 0;
  font-weight:bold;
}

button{
  padding:12px 30px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- TELA 1 -->
<div class="secao">
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/White_shark.jpg">
  <h1>❌</h1>
</div>

<!-- TELA 2 -->
<div class="secao">
  <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Electric_eel.jpg">
  <h2>Vote na enguia elétrica!!</h2>
  <div id="contador">535 assinantes</div>
  <button id="votar">Votar</button>
</div>

<audio id="somAguia">
  <source src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bald_Eagle_Call.ogg" type="audio/ogg">
</audio>

<script>
let votos = 535;
const botao = document.getElementById("votar");
const contador = document.getElementById("contador");
const som = document.getElementById("somAguia");

botao.onclick = () => {
  votos++;
  contador.textContent = votos + " assinantes";
  som.volume = 1;
  som.play();
  botao.disabled = true;
};
</script>

</body>
</html>
